version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: sqlite:////data/weather.db
      HOST: 0.0.0.0
      PORT: 8000
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      - weather_data:/data
      - ./backend:/app
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      NGINX_HOST: ${NGINX_HOST}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Los templates se procesan con envsubst → /etc/nginx/conf.d/
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./frontend:/usr/share/nginx/html:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Renovar automáticamente cada 12 horas
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    restart: unless-stopped

  duckdns:
    image: alpine
    environment:
      DUCKDNS_TOKEN: ${DUCKDNS_TOKEN}
      DUCKDNS_DOMAIN: ${DUCKDNS_DOMAIN}
    volumes:
      - ./update-duckdns.sh:/update-duckdns.sh:ro
    command: sh /update-duckdns.sh
    restart: unless-stopped

volumes:
  weather_data:
  certbot_certs:
  certbot_www:
